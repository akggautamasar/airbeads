<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Bead Battle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ── LOBBY SCREEN ─────────────────────────── -->
  <div id="screen-lobby" class="screen active">
    <div class="lobby-container">
      <div class="logo-wrap">
        <div class="logo-ornament">⬡</div>
        <h1 class="logo-title">Bead<br/>Battle</h1>
        <div class="logo-ornament flip">⬡</div>
      </div>
      <p class="tagline">An ancient war on thirteen nodes</p>

      <div class="name-row">
        <input id="player-name" type="text" placeholder="Your name" maxlength="18" autocomplete="off" />
      </div>

      <div class="lobby-actions">
        <button id="btn-create" class="btn btn-primary">Create Room</button>
        <div class="divider"><span>or</span></div>
        <div class="join-row">
          <input id="room-code-input" type="text" placeholder="Room Code" maxlength="4" autocomplete="off" />
          <button id="btn-join" class="btn btn-secondary">Join</button>
        </div>
      </div>

      <div id="lobby-message" class="lobby-message"></div>
    </div>
  </div>

  <!-- ── WAITING SCREEN ───────────────────────── -->
  <div id="screen-waiting" class="screen">
    <div class="waiting-container">
      <h2 class="waiting-title">Waiting for opponent…</h2>
      <div class="room-code-display">
        <span class="code-label">Room Code</span>
        <span id="display-code" class="code-value">----</span>
        <button id="btn-copy-code" class="btn-copy" title="Copy code">⎘</button>
      </div>
      <p class="waiting-hint">Share this code with your opponent</p>
      <div class="spinner-ring"></div>
    </div>
  </div>

  <!-- ── GAME SCREEN ───────────────────────────── -->
  <div id="screen-game" class="screen">

    <!-- Header bar -->
    <header class="game-header">
      <div class="player-panel" id="panel-p1">
        <div class="player-name" id="name-p1">Player 1</div>
        <div class="bead-count">
          <span class="bead-icon p1-color">●</span>
          <span id="count-p1">6</span>
        </div>
      </div>

      <div class="turn-indicator">
        <div id="turn-text" class="turn-text">—</div>
        <div id="turn-pip" class="turn-pip"></div>
      </div>

      <div class="player-panel right" id="panel-p2">
        <div class="player-name" id="name-p2">Player 2</div>
        <div class="bead-count">
          <span class="bead-icon p2-color">●</span>
          <span id="count-p2">6</span>
        </div>
      </div>
    </header>

    <!-- Game board (SVG rendered by JS) -->
    <main class="board-wrap">
      <svg id="game-board" viewBox="0 0 340 440" xmlns="http://www.w3.org/2000/svg">
        <!-- Rendered dynamically by board.js -->
      </svg>
      <div id="board-message" class="board-message hidden"></div>
    </main>

    <!-- Footer controls -->
    <footer class="game-footer">
      <div id="status-bar" class="status-bar">Select a bead to begin</div>
      <button id="btn-rotate" class="btn btn-ghost" title="Rotate board 180° to face opponent">⟳ Rotate</button>
      <button id="btn-restart" class="btn btn-ghost">↺ New</button>
    </footer>

  </div>

  <!-- ── WIN OVERLAY ───────────────────────────── -->
  <div id="win-overlay" class="overlay hidden">
    <div class="win-card">
      <div class="win-ornament">♔</div>
      <h2 class="win-title" id="win-title">Player 1 Wins!</h2>
      <p class="win-subtitle" id="win-subtitle">Victory through strategy</p>
      <div class="win-actions">
        <button id="btn-rematch" class="btn btn-primary">⟳ Rematch</button>
        <button id="btn-lobby" class="btn btn-ghost">↩ Lobby</button>
      </div>
      <div id="rematch-status" class="rematch-status"></div>
    </div>
  </div>

  <!-- ── DISCONNECT TOAST ──────────────────────── -->
  <div id="toast-disconnect" class="toast hidden">
    Opponent disconnected — waiting for reconnect…
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/sounds.js"></script>
  <script src="/js/board.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
